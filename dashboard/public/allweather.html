<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>All Weather 全天候策略 - SlowRich</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',system-ui,-apple-system,sans-serif;background:#fafafa;color:#1a1a1a;min-height:100vh;line-height:1.6}
a{color:#10b981;text-decoration:none}
a:hover{text-decoration:underline}

.navbar{display:flex;justify-content:space-between;align-items:center;padding:14px 28px;background:#fff;border-bottom:1px solid #e5e7eb;position:sticky;top:0;z-index:100}
.navbar-brand{font-size:20px;font-weight:800;color:#1a1a1a;letter-spacing:-.3px;text-decoration:none}
.navbar-brand span{color:#10b981}
.navbar-links{display:flex;gap:4px}
.navbar-links a{padding:8px 16px;border-radius:8px;font-size:13px;font-weight:500;color:#666;transition:all .2s}
.navbar-links a:hover{color:#1a1a1a;background:#f3f4f6;text-decoration:none}
.navbar-links a.active{color:#10b981;background:#ecfdf5}

.container{max-width:1200px;margin:0 auto;padding:24px 28px}
.section{margin-bottom:32px}
.section-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.section-title{font-size:18px;font-weight:700;color:#1a1a1a}
.section-subtitle{font-size:13px;color:#999;margin-top:2px}

.card{background:#fff;border-radius:12px;border:1px solid #e5e7eb;box-shadow:0 1px 3px rgba(0,0,0,.06);overflow:hidden;transition:box-shadow .2s;margin-bottom:16px}
.card:hover{box-shadow:0 4px 12px rgba(0,0,0,.08)}
.card-header{padding:16px 20px;border-bottom:1px solid #f3f4f6;display:flex;justify-content:space-between;align-items:center}
.card-title{font-size:14px;font-weight:700;color:#1a1a1a}
.card-body{padding:20px}

/* CTA Synergy Banner */
.cta-banner{background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:20px 24px;margin-bottom:24px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:20px;align-items:center}
.cta-signal-status{text-align:center}
.cta-signal-dot{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:6px}
.cta-signal-label{font-size:16px;font-weight:700}
.cta-signal-duration{font-size:12px;color:#999;margin-top:4px}
.cta-allocation{text-align:center;padding:12px 16px;border-radius:10px;background:#f9fafb}
.cta-allocation-title{font-size:11px;color:#999;text-transform:uppercase;letter-spacing:.5px;font-weight:500}
.cta-allocation-value{font-size:28px;font-weight:800;margin-top:4px}
.cta-reason{font-size:13px;color:#666;text-align:center;background:#ecfdf5;padding:10px 16px;border-radius:8px;font-weight:500}

/* Charts side by side */
.charts-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px}
.chart-card{background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:20px;text-align:center}
.chart-card h3{font-size:14px;font-weight:700;margin-bottom:12px;color:#1a1a1a}
.chart-container{position:relative;width:100%;max-width:320px;margin:0 auto}

/* Positions table */
.positions-table{width:100%;border-collapse:collapse;font-size:13px}
.positions-table th{padding:10px 14px;text-align:left;font-weight:600;color:#999;font-size:11px;text-transform:uppercase;border-bottom:1px solid #e5e7eb;white-space:nowrap}
.positions-table td{padding:10px 14px;border-bottom:1px solid #f3f4f6;white-space:nowrap}
.positions-table tr:last-child td{border-bottom:none}
.positions-table tr:hover{background:#f9fafb}

.sector-tag{display:inline-block;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:500}
.sector-us{background:#dbeafe;color:#2563eb}
.sector-cn{background:#fef2f2;color:#dc2626}
.sector-hk{background:#fef9c3;color:#ca8a04}
.sector-comm{background:#fef3c7;color:#d97706}
.sector-crypto{background:#ede9fe;color:#7c3aed}
.sector-bond{background:#ecfdf5;color:#059669}
.sector-em{background:#f3f4f6;color:#666}

.proxy-badge{display:inline-block;padding:1px 6px;border-radius:4px;font-size:10px;font-weight:500;background:#fef3c7;color:#92400e;margin-left:4px}

.deviation-bar{display:inline-flex;align-items:center;gap:6px;min-width:120px}
.deviation-bar-bg{width:60px;height:6px;background:#e5e7eb;border-radius:3px;overflow:hidden;position:relative}
.deviation-bar-fill{height:100%;border-radius:3px;position:absolute;top:0}
.deviation-text{font-size:12px;font-weight:600}

/* Rebalance alerts */
.alert-item{display:flex;justify-content:space-between;align-items:center;padding:14px 18px;border-bottom:1px solid #f3f4f6}
.alert-item:last-child{border-bottom:none}
.alert-left{display:flex;align-items:center;gap:12px}
.alert-icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700}
.alert-sell{background:#fef2f2;color:#dc2626}
.alert-buy{background:#ecfdf5;color:#059669}
.alert-info h4{font-size:14px;font-weight:600}
.alert-info p{font-size:12px;color:#999}
.alert-amount{font-size:14px;font-weight:700;text-align:right}
.alert-action{font-size:11px;padding:3px 10px;border-radius:6px;font-weight:600}
.action-sell{background:#fef2f2;color:#dc2626}
.action-buy{background:#ecfdf5;color:#059669}

.loading-spinner{display:inline-block;width:14px;height:14px;border:2px solid #e5e7eb;border-top-color:#10b981;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-msg{text-align:center;padding:40px;color:#ccc;font-size:13px}

/* Sector filter tabs */
.filter-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.filter-tab{padding:6px 14px;border-radius:8px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid #e5e7eb;background:#fff;color:#666;transition:all .2s}
.filter-tab:hover{border-color:#10b981;color:#10b981}
.filter-tab.active{background:#10b981;color:#fff;border-color:#10b981}

footer{padding:24px;text-align:center;color:#ccc;font-size:12px;border-top:1px solid #e5e7eb;margin-top:40px;background:#fff}

@media(max-width:768px){
  .navbar{flex-direction:column;gap:8px;padding:12px 16px}
  .container{padding:16px}
  .charts-row{grid-template-columns:1fr}
  .cta-banner{grid-template-columns:1fr;gap:12px}
  .positions-table{font-size:12px}
  .positions-table th,.positions-table td{padding:8px 10px}
}
</style>
</head>
<body>

<nav class="navbar">
  <a class="navbar-brand" href="/">Slow<span>Rich</span></a>
  <div class="navbar-links">
    <a href="/">首页</a>
    <a href="/options-monitor.html">期权</a>
    <a href="/delta-neutral.html">Delta Neutral</a>
    <a href="/allweather.html" class="active">全天候</a>
    <a href="/portfolio-summary.html">组合</a>
  </div>
</nav>

<div class="container">

  <!-- CTA Synergy Banner -->
  <div class="section">
    <div class="section-header">
      <div>
        <div class="section-title">CTA 协同状态</div>
        <div class="section-subtitle">CTA双均线信号 + All Weather建议配置</div>
      </div>
    </div>
    <div class="cta-banner" id="ctaBanner">
      <div class="cta-signal-status">
        <div id="ctaSignalLabel" class="cta-signal-label"><span class="loading-spinner"></span>加载中</div>
        <div id="ctaDuration" class="cta-signal-duration">—</div>
        <div style="margin-top:8px;font-size:12px;color:#999" id="ctaBtcPrice">—</div>
      </div>
      <div>
        <div class="cta-allocation">
          <div class="cta-allocation-title">建议 All Weather 配置</div>
          <div class="cta-allocation-value" id="ctaAWPct" style="color:#10b981">—</div>
        </div>
        <div class="cta-allocation" style="margin-top:8px">
          <div class="cta-allocation-title">建议 CTA 配置</div>
          <div class="cta-allocation-value" id="ctaCTAPct" style="color:#6366f1">—</div>
        </div>
      </div>
      <div class="cta-reason" id="ctaReason">加载中...</div>
    </div>
  </div>

  <!-- Allocation Charts -->
  <div class="section">
    <div class="section-header">
      <div>
        <div class="section-title">资产配置对比</div>
        <div class="section-subtitle">目标配置 vs 实际持仓</div>
      </div>
      <span style="font-size:12px;color:#999" id="positionCount">—</span>
    </div>
    <div class="charts-row">
      <div class="chart-card">
        <h3>目标配置</h3>
        <div class="chart-container">
          <canvas id="targetChart"></canvas>
        </div>
      </div>
      <div class="chart-card">
        <h3>实际持仓</h3>
        <div class="chart-container">
          <canvas id="currentChart"></canvas>
        </div>
      </div>
    </div>
  </div>

  <!-- Rebalance Alerts -->
  <div class="section">
    <div class="section-header">
      <div>
        <div class="section-title">再平衡提醒</div>
        <div class="section-subtitle">偏离目标 &#177;5% 时触发提醒</div>
      </div>
      <span style="font-size:13px;font-weight:600;padding:4px 12px;border-radius:8px;background:#ecfdf5;color:#059669" id="rebalanceBadge">检查中...</span>
    </div>
    <div class="card">
      <div class="card-body" style="padding:0" id="rebalanceList">
        <div class="loading-msg"><span class="loading-spinner"></span>加载再平衡数据...</div>
      </div>
    </div>
  </div>

  <!-- Positions Table -->
  <div class="section">
    <div class="section-header">
      <div>
        <div class="section-title">全部持仓明细</div>
        <div class="section-subtitle">35+ 标的跨市场配置</div>
      </div>
    </div>
    <div class="filter-tabs" id="sectorFilters">
      <div class="filter-tab active" data-sector="all" onclick="filterSector('all')">全部</div>
    </div>
    <div class="card">
      <div class="card-body" style="padding:0;overflow-x:auto">
        <table class="positions-table" id="positionsTable">
          <thead>
            <tr>
              <th>#</th>
              <th>标的</th>
              <th>板块</th>
              <th>分类</th>
              <th>目标%</th>
              <th>实际%</th>
              <th>偏离</th>
              <th>目标金额</th>
            </tr>
          </thead>
          <tbody id="positionsBody">
            <tr><td colspan="8" class="loading-msg"><span class="loading-spinner"></span>加载持仓数据...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

</div>

<footer>
  SlowRich Dashboard &mdash; All Weather 全天候策略 &mdash; 非投资建议
</footer>

<script>
const $ = id => document.getElementById(id);
let allPositions = [];
let targetChart = null;
let currentChart = null;

const SECTOR_COLORS = {
  '美股': '#3b82f6',
  'A股': '#ef4444',
  '港股': '#eab308',
  '大宗商品': '#f59e0b',
  '数字货币': '#8b5cf6',
  '债券': '#10b981',
  '新兴市场': '#6b7280',
};

const SECTOR_CLASS = {
  '美股': 'sector-us',
  'A股': 'sector-cn',
  '港股': 'sector-hk',
  '大宗商品': 'sector-comm',
  '数字货币': 'sector-crypto',
  '债券': 'sector-bond',
  '新兴市场': 'sector-em',
};

function esc(str) {
  const d = document.createElement('div');
  d.textContent = str || '';
  return d.innerHTML;
}

// ═══════════ CTA Synergy ═══════════
async function fetchCTASynergy() {
  try {
    const r = await fetch('/api/allweather/cta-signal');
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const data = await r.json();

    const signalColors = {
      golden_cross: '#10b981',
      bullish: '#10b981',
      death_cross: '#ef4444',
      bearish: '#ef4444',
      neutral: '#999',
    };
    const signalIcons = {
      golden_cross: '\u2B06',
      bullish: '\u2197',
      death_cross: '\u2B07',
      bearish: '\u2198',
      neutral: '\u2194',
    };

    const color = signalColors[data.ctaSignal] || '#999';
    $('ctaSignalLabel').innerHTML = `<span class="cta-signal-dot" style="background:${color}"></span>${esc(data.ctaStatus)}`;
    $('ctaDuration').textContent = `已持续 ${data.ctaDuration} 天`;
    $('ctaBtcPrice').textContent = `BTC $${data.btcPrice?.toLocaleString() || '—'}`;
    $('ctaAWPct').textContent = Math.round(data.suggestedAW * 100) + '%';
    $('ctaCTAPct').textContent = Math.round(data.suggestedCTA * 100) + '%';
    $('ctaReason').textContent = data.reason;
  } catch (e) {
    console.error('CTA synergy error:', e);
    $('ctaReason').textContent = '加载失败';
  }
}

// ═══════════ Config & Charts ═══════════
async function fetchConfig() {
  try {
    const r = await fetch('/api/allweather/config');
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const data = await r.json();

    allPositions = data.positions;
    $('positionCount').textContent = `${data.positionCount} 个标的 / ${data.sectorCount} 个板块`;

    // Build sector filter tabs
    const sectors = [...new Set(data.positions.map(p => p.sector))];
    const tabsHtml = '<div class="filter-tab active" data-sector="all" onclick="filterSector(\'all\')">全部</div>' +
      sectors.map(s => `<div class="filter-tab" data-sector="${esc(s)}" onclick="filterSector('${esc(s)}')">${esc(s)}</div>`).join('');
    $('sectorFilters').innerHTML = tabsHtml;

    renderPositions(data.positions);
    renderCharts(data.targetAllocation, data.currentAllocation);
  } catch (e) {
    console.error('Config error:', e);
  }
}

function renderCharts(target, current) {
  const labels = Object.keys(target);
  const sectorNames = labels.map(k => {
    const map = { 'US Equities': '美股', 'China A-Shares': 'A股', 'HK Equities': '港股', 'Commodities': '大宗商品', 'Crypto': '数字货币', 'Bonds': '债券', 'Emerging Markets': '新兴市场' };
    return map[k] || k;
  });
  const colors = sectorNames.map(n => SECTOR_COLORS[n] || '#999');

  const chartOpts = {
    responsive: true,
    maintainAspectRatio: true,
    plugins: {
      legend: { position: 'bottom', labels: { font: { size: 11 }, padding: 12 } },
      tooltip: {
        backgroundColor: '#fff', titleColor: '#1a1a1a', bodyColor: '#666',
        borderColor: '#e5e7eb', borderWidth: 1, cornerRadius: 8, padding: 10,
        callbacks: {
          label: ctx => `${ctx.label}: ${(ctx.raw * 100).toFixed(1)}%`
        }
      }
    }
  };

  if (targetChart) targetChart.destroy();
  targetChart = new Chart($('targetChart'), {
    type: 'doughnut',
    data: {
      labels: sectorNames,
      datasets: [{ data: labels.map(k => target[k]), backgroundColor: colors, borderWidth: 2, borderColor: '#fff' }]
    },
    options: chartOpts
  });

  if (currentChart) currentChart.destroy();
  currentChart = new Chart($('currentChart'), {
    type: 'doughnut',
    data: {
      labels: sectorNames,
      datasets: [{ data: labels.map(k => current[k]), backgroundColor: colors, borderWidth: 2, borderColor: '#fff' }]
    },
    options: chartOpts
  });
}

function renderPositions(positions) {
  const body = $('positionsBody');
  if (!positions.length) {
    body.innerHTML = '<tr><td colspan="8" class="loading-msg">暂无数据</td></tr>';
    return;
  }

  body.innerHTML = positions.map((p, i) => {
    const cls = SECTOR_CLASS[p.sector] || 'sector-em';
    const devColor = p.deviation > 0 ? '#ef4444' : p.deviation < 0 ? '#10b981' : '#999';
    const devText = p.deviationPercent > 0 ? `+${p.deviationPercent.toFixed(2)}%` : `${p.deviationPercent.toFixed(2)}%`;
    const proxyHtml = p.proxy ? `<span class="proxy-badge" title="${esc(p.proxyNote || '')}">代理</span>` : '';

    // Deviation bar
    const absDev = Math.min(Math.abs(p.deviationPercent), 10);
    const barWidth = Math.round(absDev * 6); // scale to max ~60px
    const barLeft = p.deviation >= 0 ? '50%' : `${50 - barWidth}%`;
    const barBg = p.deviation > 0 ? '#fecaca' : '#bbf7d0';

    return `<tr data-sector="${esc(p.sector)}">
      <td style="color:#999">${i + 1}</td>
      <td><strong>${esc(p.symbol)}</strong> <span style="font-size:11px;color:#999">${esc(p.name)}</span>${proxyHtml}</td>
      <td><span class="sector-tag ${cls}">${esc(p.sector)}</span></td>
      <td style="font-size:12px;color:#666">${esc(p.category)}</td>
      <td style="font-weight:600">${(p.targetWeight * 100).toFixed(1)}%</td>
      <td style="font-weight:600">${(p.currentWeight * 100).toFixed(1)}%</td>
      <td>
        <div class="deviation-bar">
          <div class="deviation-bar-bg"><div class="deviation-bar-fill" style="width:${barWidth}px;left:${barLeft};background:${barBg}"></div></div>
          <span class="deviation-text" style="color:${devColor}">${devText}</span>
        </div>
      </td>
      <td style="color:#666">$${p.targetAmount.toLocaleString()}</td>
    </tr>`;
  }).join('');
}

function filterSector(sector) {
  // Update active tab
  document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
  document.querySelector(`.filter-tab[data-sector="${sector}"]`)?.classList.add('active');

  const filtered = sector === 'all' ? allPositions : allPositions.filter(p => p.sector === sector);
  renderPositions(filtered);
}

// ═══════════ Rebalance Alerts ═══════════
async function fetchRebalance() {
  try {
    const r = await fetch('/api/allweather/rebalance');
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const data = await r.json();

    if (!data.needsRebalance) {
      $('rebalanceBadge').textContent = '无需调仓';
      $('rebalanceBadge').style.background = '#ecfdf5';
      $('rebalanceBadge').style.color = '#059669';
      $('rebalanceList').innerHTML = '<div class="loading-msg" style="color:#10b981">所有标的均在目标范围内，无需再平衡</div>';
      return;
    }

    $('rebalanceBadge').textContent = `${data.alertCount} 个提醒`;
    $('rebalanceBadge').style.background = '#fef2f2';
    $('rebalanceBadge').style.color = '#dc2626';

    $('rebalanceList').innerHTML = data.alerts.map(a => {
      const isSell = a.action === 'SELL' || a.action === 'REDUCE';
      const iconClass = isSell ? 'alert-sell' : 'alert-buy';
      const actionClass = isSell ? 'action-sell' : 'action-buy';
      const icon = isSell ? '\u2193' : '\u2191';
      const actionText = { SELL: '卖出', BUY: '买入', REDUCE: '减仓', INCREASE: '加仓' }[a.action] || a.action;
      const levelTag = a.level === 'sector' ? ' <span style="font-size:10px;background:#f3f4f6;padding:1px 6px;border-radius:4px;color:#999">板块</span>' : '';

      return `<div class="alert-item">
        <div class="alert-left">
          <div class="alert-icon ${iconClass}">${icon}</div>
          <div class="alert-info">
            <h4>${esc(a.asset)} ${esc(a.name || '')}${levelTag}</h4>
            <p>目标 ${(a.target * 100).toFixed(1)}% &rarr; 实际 ${(a.current * 100).toFixed(1)}% (${a.deviationPercent > 0 ? '+' : ''}${a.deviationPercent.toFixed(2)}%)</p>
          </div>
        </div>
        <div style="text-align:right">
          <div class="alert-amount">$${a.amount.toLocaleString()}</div>
          <span class="alert-action ${actionClass}">${actionText}</span>
        </div>
      </div>`;
    }).join('');
  } catch (e) {
    console.error('Rebalance error:', e);
    $('rebalanceList').innerHTML = '<div class="loading-msg" style="color:#ef4444">加载失败</div>';
  }
}

// ═══════════ Init ═══════════
fetchCTASynergy();
fetchConfig();
fetchRebalance();

// Auto refresh every 5 minutes
setInterval(() => {
  fetchCTASynergy();
  fetchConfig();
  fetchRebalance();
}, 5 * 60 * 1000);
</script>
</body>
</html>
